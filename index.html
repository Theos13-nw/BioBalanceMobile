<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- ── PWA: installable + full-screen ───────────────────── -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS full-screen (Safari) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BioBalance">
  <link rel="apple-touch-icon" href="icon-512.png">

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">

  <title>BioBalance</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100vw !important;
      /* 100dvh = dynamic viewport height — shrinks to exclude Chrome's browser bar.
         100vh includes the bar and causes the top of the game to be hidden behind it.
         Fallback to 100vh for older browsers that don't support dvh. */
      height: 100vh !important;
      height: 100dvh !important;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <script src="sketch.js"></script>

  <!-- ── PWA: register service worker ────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg) {
            console.log('[BioBalance] Service Worker registered, scope:', reg.scope);
          })
          .catch(function(err) {
            console.warn('[BioBalance] Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
