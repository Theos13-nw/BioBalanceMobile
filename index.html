<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>BioBalance: Digestive Control</title>
    <meta name="description" content="Interactive educational simulation of the human digestive system — 4 immersive phases with real-time telemetry and mastery tracking.">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BioBalance">
    <link rel="apple-touch-icon" href="DigestiveAPP_LOGO-1.png">

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050f23">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050f23;
            touch-action: none;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            position: fixed;
            top: 0;
            left: 0;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #050f23;
            color: #00ffc8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
        }

        .loading-title {
            font-size: 2.4rem;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .loading-subtitle {
            font-size: 1rem;
            color: #b8d4e3;
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
        }

        .loading-text {
            font-size: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-title">BioBalance</div>
        <div class="loading-subtitle">DIGESTIVE CONTROL</div>
        <div class="loading-text">INITIALIZING NEURAL INTERFACE...</div>
    </div>

    <script src="sketch.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[BioBalance] Service Worker registered'))
                    .catch(err => console.warn('[BioBalance] Service Worker failed:', err));
            });
        }

        // Hide loading screen after p5 initializes
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.transition = 'opacity 0.9s ease';
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 900);
                }
            }, 600);
        });
    </script>
</body>
</html>
